connections:
  postgis:
    arunit:
      host: <%= ENV["MYHOST"] || "127.0.0.1" %>
      port: <%= ENV["MYPORT"] || "3306" %>
      database: <%= ENV["MYDATABASE"] || "rgeo_adapter_test" %>
      username: <%= ENV["MYUSER"] || "mysql" %>
      password: <%= ENV["MYPASSWORD"] || "mysqlpass" %>
    arunit2:
      host: <%= ENV["MYHOST"] || "127.0.0.1" %>
      port: <%= ENV["MYPORT"] || "3306" %>
      database: <%= ENV["MYDATABASE"] || "rgeo_adapter_test" %>
      username: <%= ENV["MYUSER"] || "mysql" %>
      password: <%= ENV["MYPASSWORD"] || "mysqlpass" %>
    arunit_without_prepared_statements:
      min_messages: warning
      prepared_statements: false
      host: <%= ENV["MYHOST"] || "127.0.0.1" %>
      port: <%= ENV["MYPORT"] || "3306" %>
      database: <%= ENV["MYDATABASE"] || "rgeo_adapter_test" %>
      username: <%= ENV["MYUSER"] || "mysql" %>
      password: <%= ENV["MYPASSWORD"] || "mysqlpass" %>
